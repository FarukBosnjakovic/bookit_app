name: bookit
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # Firebase core - required for all Firebase services
  firebase_core: ^4.5.0

  # Authentication
  firebase_auth: ^6.2.0

  # Firestore database
  cloud_firestore: ^6.1.3

  # Storage (for profile photos, restaurant images)
  firebase_storage: ^13.1.0

  # State management (already have this)
  provider: ^6.1.2

  shared_preferences: ^2.2.3

  image_picker: ^1.1.2

  flutter_map: ^8.2.2
  latlong2: ^0.9.0

  http: ^1.2.0

  table_calendar: ^3.1.2

  geolocator: ^13.0.0
  geocoding: ^3.0.0

  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  sign_in_with_apple_web: ^2.1.1

  add_2_calendar: ^3.0.0

  screenshot: ^3.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

